<!DOCTYPE html>
<html lang="ja">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ゆらぽん</title>

<style>
body {
  margin: 0;
  font-family: sans-serif;

  /* 背景（スマホ対応） */
  background: url("assets/img/bg_main.jpg") center / cover no-repeat;
}

/* iPhoneのfixedバグ対策 */
@supports (-webkit-touch-callout: none) {
  body {
    background-attachment: scroll;
  }
}

/* 全体 */
.app {
  max-width: 420px;
  margin: 0 auto;
  padding: 24px;

  transform: scale(0.9);
  transform-origin: top center;
}

/* タイトル */
.title {
  font-size: 26px;
  font-weight: bold;
  margin-bottom: 16px;
  line-height: 1.4;
}

/* カード */
.card {
  background: rgba(255,255,255,0.2);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);

  border-radius: 20px;
  padding: 16px;
  margin-bottom: 24px;
}

/* ボタン */
button, a {
  display: block;
  width: 100%;
  padding: 14px;
  border-radius: 999px;
  border: none;
  text-align: center;
  font-size: 16px;

  pointer-events: auto;
  touch-action: manipulation;
}

.main-btn {
  background: #f5d77a;
}

.sub-btn {
  background: #e6d4f7;
}

.room-btn {
  background: #f5d77a;
  text-decoration: none;
  color: black;
}

/* ゆらぽん */
.yurapon {
  position: fixed;
  top: 12px;
  right: 12px;
  width: 85px;

  pointer-events: none;
  z-index: 1;

  filter: drop-shadow(0 6px 10px rgba(0,0,0,0.2));
}
</style>

</head>

<body>

<!-- ゆらぽん -->
<video class="yurapon" autoplay muted loop playsinline>
  <source src="assets/video/yurapon.main.mp4" type="video/mp4">
</video>

<div class="app">

  <div class="title">
    灯観測装置<br>〜ゆらぽん〜
  </div>

  <a href="room.html" class="room-btn">灯の部屋</a>

  <div class="card">
    <h3>灯ってなに？</h3>
    <p>
      灯は、もともとみんなの中にある願いのあたたかさ。<br>
      この装置は「いまどんな流れか」をやさしく観測するための小さい端末だよ。
    </p>
  </div>

  <div class="card">
    <h3>今日あったこと</h3>

    <button>楽しいことあった</button>
    <button>美味しいもの食べた</button>
    <button>好きな人に会えた</button>
    <button>ちょっと笑えた</button>

    <br>

    <button class="main-btn">ぽあんでみる</button>
  </div>

  <div class="card">
    <h3>いま見えてるもの</h3>

    <p>空気：ふわっとしてる</p>
    <p>灯：やわらいでる</p>
    <p>ゆらぽん：ちゃんと見えてるよ</p>

    <button class="sub-btn">もっと見る</button>
    <a href="room.html" class="room-btn">灯の部屋</a>
  </div>

</div>

</body>
</html>
